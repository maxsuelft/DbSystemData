# CI: lint e testes do backend e frontend (roda em todo push/PR).
# O workflow "Build and push Docker image" roda só em push para main/master.
name: CI (backend + frontend)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.1
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure Git for container
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Go modules
        run: |
          cd backend
          go mod download

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.3
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install swag for swagger generation
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Generate swagger docs
        run: |
          cd backend
          swag init -d . -g cmd/main.go -o swagger

      - name: Run golangci-lint
        run: |
          cd backend
          golangci-lint run

      - name: Verify go mod tidy
        run: |
          cd backend
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go mod tidy made changes, please run 'go mod tidy' and commit the changes" && exit 1)

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Check code format (Prettier)
        run: |
          cd frontend
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" || (echo "Execute 'npm run format' no frontend e faça commit." && exit 1)

      - name: Check if linter was run
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  test-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

  test-backend:
    runs-on: ubuntu-latest
    needs: [lint-backend]
    container:
      image: golang:1.26.1
      options: --privileged
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure Git for container
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Go modules
        run: |
          cd backend
          go mod download

      - name: Run Go tests (skip external resources)
        run: |
          cd backend
          ENV_MODE=development IS_SKIP_EXTERNAL_RESOURCES_TESTS=true go test -p=1 -count=1 -timeout 5m ./internal/... 2>&1
