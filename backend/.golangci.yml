version: "2"

run:
  timeout: 5m
  tests: false
  concurrency: 4

linters:
  default: standard

  settings:
    errcheck:
      check-type-assertions: true

formatters:
  enable:
    - gofumpt
    - golines
    - gci

  settings:
    golines:
      max-len: 120
    gofumpt:
      module-path: databasus-backend
      extra-rules: true
    gci:
      sections:
        - standard
        - default
        - localmodule
